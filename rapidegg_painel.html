<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPIDEGG - Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    background: #2c1a0e;
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 40px),
      repeating-linear-gradient(180deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 60px);
  }

  .header {
    background: linear-gradient(180deg, #1a0e06 0%, #2c1a0e 100%);
    padding: 18px 16px 16px;
    border-bottom: 3px solid #8B6914;
    position: relative;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header::after {
    content: ''; position: absolute; bottom: -6px; left: 0; right: 0;
    height: 3px; background: #c9a52a;
  }
  .header-logo { }
  .logo-rapid { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: #f5f0e8; }
  .logo-egg   { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: #c9a52a; }
  .logo-sub   { font-size: 10px; color: #8B6914; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
  .btn-refresh {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid #8B6914;
    color: #c9a52a; border-radius: 10px;
    padding: 8px 14px; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: 'Lato', sans-serif;
  }
  .btn-refresh:active { background: rgba(255,255,255,0.15); }

  .cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 16px 14px 12px;
  }
  .card {
    border-radius: 12px; padding: 14px;
    border: 1.5px solid #5a3e1b;
    background: rgba(255,255,255,0.05);
  }
  .card-label { font-size: 10px; color: #a08040; text-transform: uppercase; letter-spacing: 1px; }
  .card-val   { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #f5f0e8; margin-top: 4px; }
  .card-sub   { font-size: 11px; color: #6b4f1a; margin-top: 2px; }
  .card.verde  .card-val { color: #9ecf88; }
  .card.dourado .card-val { color: #e8c350; }
  .card.total  { border-color: #8B6914; background: rgba(139,105,20,0.15); }
  .card.total .card-val { color: #c9a52a; }

  .filtros {
    display: flex; gap: 8px;
    padding: 0 14px 12px; overflow-x: auto;
  }
  .filtro {
    padding: 7px 16px; border-radius: 20px;
    border: 1.5px solid #5a3e1b;
    background: rgba(255,255,255,0.05);
    font-size: 12px; font-weight: 700; color: #a08040;
    cursor: pointer; white-space: nowrap;
    font-family: 'Lato', sans-serif; -webkit-appearance: none;
  }
  .filtro.active { background: #8B6914; color: #f5f0e8; border-color: #c9a52a; }

  .section-title {
    font-size: 11px; font-weight: 700; color: #8B6914;
    text-transform: uppercase; letter-spacing: 2px;
    padding: 0 14px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #3a2510; }

  .lista { padding: 0 14px 80px; }
  .item {
    background: #f5f0e0;
    border-radius: 12px; padding: 13px 14px;
    margin-bottom: 8px;
    border: 1.5px solid #c9a87a;
    display: flex; align-items: center; gap: 12px;
  }
  .item-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
    border: 2px solid;
  }
  .av-branco  { background: #eaf5e4; color: #2d6020; border-color: #7aba68; }
  .av-caipira { background: #fdf5e0; color: #7a5500; border-color: #c9a52a; }
  .item-info  { flex: 1; min-width: 0; }
  .item-nome  { font-size: 15px; font-weight: 700; color: #2c1a0e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-det   { font-size: 12px; color: #8B6914; margin-top: 2px; }
  .item-val   { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: #2d6020; flex-shrink: 0; }

  .empty { text-align: center; padding: 60px 20px; color: #6b4f1a; }
  .empty-icon { font-size: 40px; }
  .empty p { font-size: 14px; margin-top: 8px; color: #8B6914; }
  .loading { text-align: center; padding: 40px; color: #8B6914; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div><span class="logo-rapid">RAPID</span><span class="logo-egg">EGG</span></div>
    <div class="logo-sub">🐔 Painel do Responsável</div>
  </div>
  <button class="btn-refresh" onclick="carregar()">↻ Atualizar</button>
</div>

<div class="cards" id="cards">
  <div class="card total">
    <div class="card-label">Total vendido</div>
    <div class="card-val" id="c-total">—</div>
  </div>
  <div class="card">
    <div class="card-label">Registros</div>
    <div class="card-val" id="c-registros">—</div>
  </div>
  <div class="card verde">
    <div class="card-label">Brancos</div>
    <div class="card-val" id="c-brancos">—</div>
    <div class="card-sub">bandejas</div>
  </div>
  <div class="card dourado">
    <div class="card-label">Caipira</div>
    <div class="card-val" id="c-caipira">—</div>
    <div class="card-sub">bandejas</div>
  </div>
</div>

<div class="filtros">
  <button class="filtro active" onclick="filtrar('todos', this)">Todos</button>
  <button class="filtro" onclick="filtrar('Branco', this)">Branco</button>
  <button class="filtro" onclick="filtrar('Caipira', this)">Caipira</button>
  <button class="filtro" onclick="filtrar('hoje', this)">Hoje</button>
</div>

<div class="section-title">Registros</div>
<div class="lista" id="lista"><div class="loading">🥚 Carregando...</div></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzUnbBjFK0eFVzZ9dEYtvZAfPqlkrhCZuTN-Cva1owIUMw7l_ISogx2PaxaZ6kEdPxk9Q/exec';
let todosRegistros = [];

function iniciais(nome) {
  return nome.split(' ').slice(0,2).map(p => p[0]).join('').toUpperCase();
}
function formatarData(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}
function ehHoje(ts) {
  const d = new Date(ts), h = new Date();
  return d.getDate()===h.getDate() && d.getMonth()===h.getMonth() && d.getFullYear()===h.getFullYear();
}

function renderizar(registros) {
  const lista = document.getElementById('lista');
  if (!registros.length) {
    lista.innerHTML = '<div class="empty"><div class="empty-icon">🥚</div><p>Nenhum registro encontrado.</p></div>';
    return;
  }
  lista.innerHTML = registros.slice().reverse().map(r => {
    const tipo  = (r['Tipo']||'').trim();
    const nome  = r['Nome'] || '—';
    const qtd   = r['Quantidade'] || 1;
    const ts    = r['Timestamp'] || '';
    const valor = parseFloat(r['Valor']||0).toFixed(2).replace('.',',');
    const av    = tipo === 'Branco' ? 'av-branco' : 'av-caipira';
    return `<div class="item">
      <div class="item-avatar ${av}">${iniciais(nome)}</div>
      <div class="item-info">
        <div class="item-nome">${nome}</div>
        <div class="item-det">${qtd}x ${tipo} · ${formatarData(ts)}</div>
      </div>
      <div class="item-val">R$ ${valor}</div>
    </div>`;
  }).join('');
}

function atualizarCards(registros) {
  const total   = registros.reduce((s,r) => s + parseFloat(r['Valor']||0), 0);
  const brancos = registros.filter(r=>(r['Tipo']||'').trim()==='Branco').reduce((s,r)=>s+parseInt(r['Quantidade']||0),0);
  const caipira = registros.filter(r=>(r['Tipo']||'').trim()==='Caipira').reduce((s,r)=>s+parseInt(r['Quantidade']||0),0);
  document.getElementById('c-total').textContent     = 'R$ ' + total.toFixed(2).replace('.',',');
  document.getElementById('c-registros').textContent = registros.length;
  document.getElementById('c-brancos').textContent   = brancos;
  document.getElementById('c-caipira').textContent   = caipira;
}

function filtrar(tipo, btn) {
  document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let f = todosRegistros;
  if (tipo==='Branco')  f = todosRegistros.filter(r=>(r['Tipo']||'').trim()==='Branco');
  if (tipo==='Caipira') f = todosRegistros.filter(r=>(r['Tipo']||'').trim()==='Caipira');
  if (tipo==='hoje')    f = todosRegistros.filter(r=>ehHoje(r['Timestamp']));
  renderizar(f); atualizarCards(f);
}

async function carregar() {
  document.getElementById('lista').innerHTML = '<div class="loading">🥚 Carregando...</div>';
  try {
    const res  = await fetch(API_URL + '?t=' + Date.now());
    const json = await res.json();
    todosRegistros = (json.data||[]).filter(r=>r['Nome']);
    atualizarCards(todosRegistros);
    renderizar(todosRegistros);
  } catch(e) {
    document.getElementById('lista').innerHTML = '<div class="empty"><p>Erro ao carregar. Verifique a conexão.</p></div>';
  }
}

carregar();
setInterval(carregar, 60000);
</script>
</body>
</html>
